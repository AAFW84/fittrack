<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E1113">
<title>FitTrack · Arturo</title>
<style>
:root{
  --bg:#0E1113; --card:#171C1F; --card2:#1E2529; --green:#3DDC6A; --greenDim:#1E5C34;
  --amber:#FFB020; --text:#EDF2EF; --mut:#8FA098; --line:#262E33; --red:#FF5C5C;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
#app{max-width:560px;margin:0 auto;padding-bottom:96px}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
.hdr{padding:20px 14px 6px}
.kicker{font-size:11px;letter-spacing:3px;color:var(--green);font-weight:800}
h1{margin:4px 0 0;font-size:26px;font-weight:900}
.sub{color:var(--mut);font-size:13px}
.card{background:var(--card);border-radius:14px;padding:16px;margin:10px 14px;border:1px solid var(--line)}
.h2{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut);font-weight:700;margin:0 0 10px}
.btn{background:var(--green);color:#08130B;border:none;border-radius:10px;padding:12px 18px;font-weight:800;font-size:15px;width:100%}
.btn2{background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-weight:700;font-size:14px}
.inp{background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:12px;font-size:16px;width:100%}
.pill{border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;border:1px solid var(--line);background:var(--card);color:var(--mut);white-space:nowrap}
.pill.on{background:var(--green);color:#08130B;border-color:var(--green)}
.row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.chk{width:28px;height:28px;border-radius:8px;flex-shrink:0;border:2px solid var(--mut);background:transparent;color:#08130B;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;margin-top:2px}
.chk.on{background:var(--green);border-color:var(--green)}
.tag{font-size:10px;letter-spacing:1.5px;font-weight:800;color:var(--green)}
.gbox{background:#12171A;border-radius:12px;padding:12px;margin:8px 0 4px;border:1px solid var(--line)}
.gimg{width:100%;border-radius:10px;display:block;background:#0B0F11;margin-bottom:10px}
.wk{width:44px;height:52px;border-radius:10px;font-size:22px;background:var(--card2);border:1px solid var(--line)}
.wk.on{background:var(--greenDim);border-color:var(--green)}
nav{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;background:var(--card);border-top:1px solid var(--line);display:flex;padding:6px 0 10px;z-index:50}
nav button{flex:1;background:none;border:none;padding:6px 0;color:var(--mut)}
nav button.on{color:var(--green)}
nav .ic{font-size:20px}
nav .lb{font-size:11px;letter-spacing:.5px}
.small{color:var(--mut);font-size:12.5px;line-height:1.5}
.hide{display:none}
.editbox{background:var(--card2);border:1px dashed var(--green);border-radius:10px;padding:10px;margin-top:8px}
::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
</style>

const DB={
  get(k){try{const v=localStorage.getItem("ft_"+k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem("ft_"+k,JSON.stringify(v))}catch(e){console.error(e)}}
};

let UNIDAD=DB.get("unidad")||"kg";
const KG2LB=2.20462;
function unidadLabel(){return UNIDAD==="kg"?"kg":"lb";}
function fmtPeso(kg){if(kg===undefined||kg===null||kg==="")return "";const n=parseFloat(kg);if(isNaN(n))return "";const v=UNIDAD==="kg"?n:n*KG2LB;return Math.round(v*10)/10;}
function pesoToKg(val){if(val===undefined||val===null||val==="")return null;const n=parseFloat(val);if(isNaN(n))return null;const v=UNIDAD==="kg"?n:n/KG2LB;return Math.round(v*100)/100;}

/* ============ HISTORIAL DE PESOS (mejora 1) ============ */
// Al marcar un ejercicio con peso como completado, guardamos {fecha,peso} en historial por ejercicio.
function registrarPeso(ejId, peso){
  if(!peso) return;
  const hk="hist:"+ejId;
  let h=DB.get(hk)||[];
  h=h.filter(r=>r.fecha!==ST.fecha);
  h.push({fecha:ST.fecha,peso:parseFloat(peso)});
  h.sort((a,b)=>a.fecha.localeCompare(b.fecha));
  DB.set(hk,h);
}
function histEj(ejId){return DB.get("hist:"+ejId)||[]}

/* ============ NOTIFICACIONES LOCALES (mejora 2) ============ */
async function pedirNotif(){
  if(!("Notification" in window)){alert("Este dispositivo no soporta notificaciones.");return}
  const p=await Notification.requestPermission();
  DB.set("notif",p==="granted");
  render();
  if(p==="granted") programarRecordatorios();
}
function programarRecordatorios(){
  if(!DB.get("notif")) return;
  if(!("serviceWorker" in navigator)) return;
  navigator.serviceWorker.ready.then((reg)=>{
    const now=new Date();
    const prog=(h,m,dias,titulo,cuerpo,tag)=>{
      const t=new Date(); t.setHours(h,m,0,0);
      if(t<=now) t.setDate(t.getDate()+1);
      let guard=0;
      while(!dias.includes(t.getDay()) && guard<8){ t.setDate(t.getDate()+1); guard++; }
      const ms=t-now;
      if(ms>0 && ms<86400000*2 && reg.active){
        reg.active.postMessage({type:"notify",delay:ms,title:titulo,body:cuerpo,tag:tag});
      }
    };
    prog(18,45,[1,2,3,4,5],"💪 FitTrack","Tu entrenamiento es a las 19:00. ¡Prepara la mochila!","train");
    prog(8,0,[6],"⚖️ FitTrack","Sábado de pesaje: mídete en ayunas y registra peso y cintura.","weigh");
  });
}

const esc=(s)=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function guiaHTML(gid){
  const g=G[gid]; if(!g||!g.maq) return "";
  const src=IMGS[g.img]?`<img class="gimg" src="${IMGS[g.img]}" alt="Guía visual del ejercicio">`:"";
  const pasos=g.tec.map((t,i)=>`<div style="display:flex;gap:8px;font-size:13px;line-height:1.5;padding:3px 0"><b style="color:var(--green)">${i+1}.</b><span>${esc(t)}</span></div>`).join("");
  return `<div class="gbox">
    ${src}
    <div class="tag">LA MÁQUINA</div>
    <div style="font-size:13px;margin-bottom:8px;line-height:1.5">${esc(g.maq)}</div>
    <div class="tag">MOVIMIENTO ADECUADO</div>${pasos}
    <div class="tag" style="color:var(--amber);margin-top:8px">ALTERNATIVA / SI ESTÁ OCUPADA</div>
    <div style="font-size:13px;line-height:1.5">${esc(g.alt)}</div>
  </div>`;
}

function histHTML(ejId){
  const h=histEj(ejId); if(h.length<1) return "";
  const max=Math.max(...h.map(r=>r.peso),1);
  const ult=h[h.length-1].peso, prev=h.length>1?h[h.length-2].peso:null;
  const delta=prev!=null?(ult-prev):null;
  const barras=h.slice(-8).map(r=>{
    const alt=Math.max(6,Math.round(r.peso/max*44));
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div style="font-size:9px;color:var(--mut)">${fmtPeso(r.peso)}</div>
      <div style="width:70%;height:${alt}px;background:var(--green);border-radius:3px"></div>
      <div style="font-size:8px;color:var(--mut)">${r.fecha.slice(5)}</div>
    </div>`;}).join("");
  const flecha=delta!=null?(delta>0?`<span style="color:var(--green)">▲ +${fmtPeso(delta).toFixed(1)} ${unidadLabel()}</span>`:delta<0?`<span style="color:var(--amber)">▼ ${fmtPeso(delta).toFixed(1)} ${unidadLabel()}</span>`:`<span style="color:var(--mut)">= igual</span>`):"";
  return `<div style="background:#12171A;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:6px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div class="tag" style="color:var(--mut)">HISTORIAL DE FUERZA</div>${flecha}
    </div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:60px">${barras}</div>
  </div>`;
}

/* ================= VISTAS ================= */
function vHoy(){
  const r=RUTINA[ST.dow]||RUTINA[0];
  const tot=r.ej.length, hechos=r.ej.filter(e=>log.done[e.id]).length;
  const hcom=DIETA.filter(c=>log.comidas[c.id]).length;
  const prog=Math.round(((hechos/tot)*0.5+(hcom/DIETA.length)*0.35+(Math.min(log.agua,AGUA_META)/AGUA_META)*0.15)*100);
  const per=(medidas.length&&medidas[0].peso&&medidas[medidas.length-1].peso)?fmtPeso(medidas[0].peso-medidas[medidas.length-1].peso).toFixed(1):null;
  const R=52,circ=2*Math.PI*R,off=circ*(1-prog/100);
  const ring=`<svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r="${R}" stroke="var(--line)" stroke-width="10" fill="none"/>
    <circle cx="65" cy="65" r="${R}" stroke="${prog>=100?'var(--amber)':'var(--green)'}" stroke-width="10" fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 65 65)"/>
    <text x="65" y="60" text-anchor="middle" fill="var(--text)" font-size="26" font-weight="900">${prog}%</text>
    <text x="65" y="80" text-anchor="middle" fill="var(--mut)" font-size="10" letter-spacing="1.5">DÍA</text></svg>`;
  const tabsDia=[1,2,3,4,5,6,0].map(d=>`<button class="pill ${ST.dow===d?'on':''}" data-dow="${d}">${DIAS[d].slice(0,3)}</button>`).join("");
  const filas=r.ej.map(e=>{
    const wk=e.peso?`<input class="inp" data-wpeso="${e.id}" inputmode="decimal" placeholder="${unidadLabel()}" value="${fmtPeso(log.pesos[e.id])||''}" style="width:62px;padding:8px 6px;text-align:center;font-size:14px">`:"";
    const btnG=e.g&&G[e.g]&&G[e.g].maq?`<button class="btn2" data-guia="${e.id}" style="padding:4px 10px;font-size:11.5px;margin-top:6px;border-color:${ST.abierto===e.id?'var(--green)':'var(--line)'};color:${ST.abierto===e.id?'var(--green)':'var(--mut)'}">${ST.abierto===e.id?'▲ Ocultar guía':'▼ Ver máquina y movimiento'}</button>`:"";
    const done=log.done[e.id];
    return `<div style="padding:11px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <button class="chk ${done?'on':''}" data-ej="${e.id}">${done?'✓':''}</button>
        <div style="flex:1">
          <div style="font-size:14.5px;font-weight:600;${done?'text-decoration:line-through;opacity:.55':''}">${esc(e.n)}</div>
          <div class="small">${esc(e.d)}</div>${btnG}
        </div>${wk}
      </div>
      ${ST.abierto===e.id?guiaHTML(e.g):""}
      ${e.peso?histHTML(e.id):""}
    </div>`;}).join("");
  return `<div class="card" style="display:flex;align-items:center;gap:16px">
      ${ring}
      <div style="flex:1">
        <div style="font-size:15px;font-weight:800">${esc(r.titulo)}</div>
        <div class="small" style="margin-top:4px">${hechos}/${tot} ejercicios · ${hcom}/${DIETA.length} comidas · ${log.agua}/${AGUA_META} vasos</div>
        ${per?`<div style="color:var(--amber);font-size:13px;margin-top:6px;font-weight:700">▼ ${per} ${unidadLabel()} desde el inicio</div>`:""}
      </div></div>
    <div style="display:flex;gap:6px;margin:0 14px;overflow-x:auto;padding-bottom:4px">${tabsDia}</div>
    <div class="card"><div class="h2">Rutina · ${esc(r.titulo)}</div>${filas}</div>`;
}

function vDieta(){
  const subs=[["hoy","Hoy"],["semana","Menú semanal"],["compras","🛒 Compras"]].map(([id,l])=>`<button class="pill ${ST.subDieta===id?'on':''}" data-sub="${id}">${l}</button>`).join("");
  let body="";
  if(ST.subDieta==="hoy"){
    const macros=[["~"+KCAL,"kcal"],[PROT+"g","proteína"],["3L","agua"]].map(([v,l])=>`<div style="flex:1;background:var(--card2);border-radius:10px;padding:12px 4px"><div style="font-size:20px;font-weight:900;color:var(--green)">${v}</div><div style="font-size:11px;color:var(--mut);letter-spacing:1px">${l.toUpperCase()}</div></div>`).join("");
    const coms=DIETA.map(c=>`<div class="row" data-com="${c.id}" style="cursor:pointer;${log.comidas[c.id]?'opacity:.6':''}">
      <div class="chk ${log.comidas[c.id]?'on':''}">${log.comidas[c.id]?'✓':''}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:14.5px">${esc(c.h)} · ${esc(c.n)} <span style="color:var(--mut);font-weight:500">· ~${c.kcal} kcal</span></div><div class="small">${esc(c.det)}</div></div></div>`).join("");
    const vasos=Array.from({length:AGUA_META}).map((_,i)=>`<button class="wk ${i<log.agua?'on':''}" data-agua="${i+1}">${i<log.agua?'💧':''}</button>`).join("");
    const reglas=REGLAS.map(x=>`<div style="display:flex;gap:10px;padding:7px 0;font-size:13.5px"><span style="color:var(--green);font-weight:900">›</span><span>${esc(x)}</span></div>`).join("");
    body=`<div class="card"><div class="h2">Objetivo diario</div><div style="display:flex;gap:10px;text-align:center">${macros}</div></div>
      <div class="card"><div class="h2">Comidas de hoy</div>${coms}</div>
      <div class="card"><div class="h2">Agua · ${log.agua}/${AGUA_META} vasos (≈${(log.agua*0.375).toFixed(1)} L)</div><div style="display:flex;gap:6px;flex-wrap:wrap">${vasos}</div></div>
      <div class="card"><div class="h2">Reglas de oro</div>${reglas}</div>`;
  }else if(ST.subDieta==="semana"){
    const rows=MENU.map((m,i)=>{
      const hoy=DIAS[new Date().getDay()]===m.dia;
      const editable=ST.edit?`<div class="editbox">
        <div class="tag">EDITAR ${esc(m.dia).toUpperCase()}</div>
        <input class="inp" data-menu="${i}" data-f="des" value="${esc(m.des)}" style="margin:4px 0;font-size:13px" placeholder="Desayuno">
        <input class="inp" data-menu="${i}" data-f="alm" value="${esc(m.alm)}" style="margin:4px 0;font-size:13px" placeholder="Almuerzo">
        <input class="inp" data-menu="${i}" data-f="cen" value="${esc(m.cen)}" style="margin:4px 0;font-size:13px" placeholder="Cena"></div>`:
        `<div class="small" style="line-height:1.6;margin-top:3px"><b style="color:var(--text)">Desayuno:</b> ${esc(m.des)}<br><b style="color:var(--text)">Almuerzo:</b> ${esc(m.alm)}<br><b style="color:var(--text)">Cena:</b> ${esc(m.cen)}</div>`;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--line)"><div style="font-weight:800;font-size:14.5px;color:${hoy?'var(--green)':'var(--text)'}">${esc(m.dia)} ${hoy?'· HOY':''}</div>${editable}</div>`;}).join("");
    body=`<div class="card"><div class="h2">Menú de la semana</div><div class="small" style="margin-bottom:10px">Las meriendas (10:00 y 16:30) son iguales cada día. ${ST.edit?'<b style="color:var(--green)">Modo edición activo:</b> cambia lo que quieras.':''}</div>${rows}</div>`;
  }else{
    const hechas=COMPRAS.reduce((a,c)=>a+c.items.filter(([id])=>compras[id]).length,0);
    const total=COMPRAS.reduce((a,c)=>a+c.items.length,0);
    const cats=COMPRAS.map(c=>{
      const items=c.items.map(([id,txt])=>`<div class="row" data-compra="${id}" style="cursor:pointer;padding:9px 0;align-items:center;${compras[id]?'opacity:.5':''}"><div class="chk ${compras[id]?'on':''}" style="width:26px;height:26px;margin-top:0">${compras[id]?'✓':''}</div><div style="font-size:13.5px;${compras[id]?'text-decoration:line-through':''}">${esc(txt)}</div></div>`).join("");
      return `<div class="card"><div class="h2">${esc(c.cat)}</div>${items}</div>`;}).join("");
    body=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="h2" style="margin:0">Lista para el súper · ${hechas}/${total}</div><button class="btn2" id="resetCompras" style="padding:5px 10px;font-size:11.5px;color:var(--amber)">↺ Nueva semana</button></div><div class="small">Cubre los 7 días del menú. Marca lo que vas metiendo al carrito.</div></div>${cats}`;
  }
  return `<div style="display:flex;gap:6px;margin:0 14px">${subs}</div>${body}`;
}

function vProgreso(){
  const filas=medidas.slice().reverse().slice(0,8).map(m=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px"><span style="color:var(--mut)">${m.fecha}</span><span>${m.peso?fmtPeso(m.peso)+' '+unidadLabel():'—'} · ${m.cintura?m.cintura+' cm':'—'}</span></div>`).join("");
  let chart="";
  if(medidas.length){
    const ps=medidas.filter(m=>m.peso).map(m=>fmtPeso(m.peso));
    const mn=Math.min(...ps)-1,mx=Math.max(...ps)+1;
    const W=480,H=160,pad=30;
    const pts=medidas.filter(m=>m.peso).map(m=>({...m,peso:fmtPeso(m.peso)}));
    const xs=(i)=>pad+(pts.length<2?0:i*(W-2*pad)/(pts.length-1));
    const ys=(v)=>H-pad-((v-mn)/(mx-mn||1))*(H-2*pad);
    const path=pts.map((m,i)=>`${i?'L':'M'}${xs(i)},${ys(m.peso)}`).join(" ");
    const dots=pts.map((m,i)=>`<circle cx="${xs(i)}" cy="${ys(m.peso)}" r="4" fill="var(--green)"/>`).join("");
    const labs=pts.map((m,i)=>`<text x="${xs(i)}" y="${H-8}" font-size="9" fill="var(--mut)" text-anchor="middle">${m.fecha.slice(5)}</text>`).join("");
    chart=`<div class="card"><div class="h2">Evolución de peso</div><svg viewBox="0 0 ${W} ${H}" width="100%"><path d="${path}" stroke="var(--green)" stroke-width="3" fill="none"/>${dots}${labs}<text x="4" y="${ys(mx)+4}" font-size="9" fill="var(--mut)">${mx.toFixed(0)}</text><text x="4" y="${ys(mn)+4}" font-size="9" fill="var(--mut)">${mn.toFixed(0)}</text></svg><div style="margin-top:8px">${filas}</div></div>`;
  }
  const metas=METAS.map(m=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px"><span style="color:var(--mut)">${m.n}</span><span><span style="color:var(--mut)">${m.de}</span> <span style="color:var(--green);font-weight:800">→ ${m.a}</span></span></div>`).join("");
  return `<div class="card"><div class="h2">Unidad de peso</div><div style="display:flex;gap:8px"><button class="pill ${UNIDAD==='kg'?'on':''}" data-unidad="kg">Kilogramos (kg)</button><button class="pill ${UNIDAD==='lb'?'on':''}" data-unidad="lb">Libras (lb)</button></div></div><div class="card"><div class="h2">Registrar medición semanal</div>
      <div style="display:flex;gap:8px;margin-bottom:10px"><input class="inp" id="inPeso" inputmode="decimal" placeholder="Peso (${unidadLabel()})"><input class="inp" id="inCint" inputmode="decimal" placeholder="Cintura (cm)"></div>
      <button class="btn" id="guardarMedida">Guardar medición</button>
      <div class="small" style="margin-top:8px">Ideal: sábado en ayunas, misma báscula, cintura al ombligo.</div></div>
    ${chart}
    <div class="card"><div class="h2">Metas a 12 semanas</div>${metas}</div>`;
}

function vPlan(){
  const notifOn=DB.get("notif");
  const fases=FASES.map((f,i)=>`<div class="card" style="border-left:4px solid ${i===faseActual()?'var(--green)':'var(--line)'}"><div style="font-size:11px;letter-spacing:2px;color:${i===faseActual()?'var(--green)':'var(--mut)'};font-weight:800">${f.sem.toUpperCase()} ${i===faseActual()?'· FASE ACTUAL':''}</div><div style="font-weight:800;font-size:16px;margin:4px 0">${f.n}</div><div class="small">${f.det}</div></div>`).join("");
  const horario=[["Lun-Vie","19:00-20:00 · Rutina del día"],["Sábado","Mañana (opcional) · Cardio + abdomen + pesaje"],["Domingo","Descanso + comida libre + meal prep"]].map(([d,t])=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px"><b style="color:var(--green);width:70px;flex-shrink:0">${d}</b><span style="color:var(--mut)">${t}</span></div>`).join("");
  const consejos=CONSEJOS.map(([t,d])=>`<div style="padding:9px 0;border-bottom:1px solid var(--line)"><div style="font-weight:800;font-size:14px">${t}</div><div class="small" style="margin-top:2px">${d}</div></div>`).join("");
  return `<div class="card"><div class="h2">Tu estrategia: recomposición corporal</div><div style="font-size:14px;line-height:1.6">Déficit moderado (~2,200 kcal) + alta proteína (180g) + fuerza 5 días. Pierdes grasa abdominal <b style="color:var(--green)">mientras</b> construyes músculo. La grasa no se quema localizada: el abdomen baja cuando baja tu grasa total.</div></div>
    <div class="card"><div class="h2">⏰ Recordatorios</div>
      <div class="small" style="margin-bottom:10px">Notificaciones locales: aviso para entrenar (lun-vie 18:45) y para pesarte (sábado 8:00). Funcionan mientras la app esté instalada y abierta en segundo plano.</div>
      <button class="btn" id="btnNotif" style="background:${notifOn?'var(--card2)':'var(--green)'};color:${notifOn?'var(--green)':'#08130B'}">${notifOn?'✓ Recordatorios activados':'Activar recordatorios'}</button></div>
    ${fases}
    <div class="card"><div class="h2">Horario semanal</div>${horario}</div>
    <div class="card"><div class="h2">Consejos PRO</div>${consejos}</div>
    <div class="card"><div class="h2">⚙️ Personalización</div>
      <div class="small" style="margin-bottom:10px">El modo edición te deja modificar el menú semanal directamente. Para cambios de rutina o compras avísame y te los ajusto.</div>
      <button class="btn2" id="btnReset" style="width:100%;color:var(--amber)">↺ Restaurar plan original</button></div>`;
}

/* ================= RENDER PRINCIPAL ================= */
function render(){
  const app=document.getElementById("app");
  let vista="";
  if(ST.tab==="hoy") vista=vHoy();
  else if(ST.tab==="dieta") vista=vDieta();
  else if(ST.tab==="progreso") vista=vProgreso();
  else if(ST.tab==="plan") vista=vPlan();
  const editBtn=(ST.tab==="dieta"&&ST.subDieta==="semana")?`<button class="btn2" id="btnEdit" style="padding:6px 12px;font-size:12px;color:${ST.edit?'var(--green)':'var(--mut)'};border-color:${ST.edit?'var(--green)':'var(--line)'}">${ST.edit?'✓ Guardar cambios':'✏️ Editar'}</button>`:"";
  const nav=[["hoy","🏋️","Hoy"],["dieta","🍽️","Dieta"],["progreso","📈","Progreso"],["plan","🗓️","Plan"]].map(([id,ic,l])=>`<button class="${ST.tab===id?'on':''}" data-tab="${id}"><div class="ic">${ic}</div><div class="lb">${l}</div></button>`).join("");
  app.innerHTML=`
    <div class="hdr">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="kicker">SEMANA ${semanaActual()} DE 12 · ${FASES[faseActual()].n.toUpperCase()}</div>
        <h1>FitTrack <span style="color:var(--green)">·</span> Arturo</h1>
        <div class="sub">${DIAS[new Date().getDay()]}, ${ST.fecha} · Series de hoy: <b style="color:var(--text)">${seriesTxt()}</b></div></div>
        ${editBtn}
      </div>
    </div>
    ${vista}
    <nav>${nav}</nav>`;
  wire();
}

/* ================= EVENTOS ================= */
function wire(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ST.tab=b.dataset.tab;ST.abierto=null;if(ST.tab==="hoy")ST.dow=new Date().getDay();render()});
  document.querySelectorAll("[data-dow]").forEach(b=>b.onclick=()=>{ST.dow=+b.dataset.dow;ST.abierto=null;render()});
  document.querySelectorAll("[data-sub]").forEach(b=>b.onclick=()=>{ST.subDieta=b.dataset.sub;ST.edit=false;render()});
  document.querySelectorAll("[data-ej]").forEach(b=>b.onclick=()=>{const id=b.dataset.ej;log.done[id]=!log.done[id];if(log.done[id]&&log.pesos[id])registrarPeso(id,log.pesos[id]);saveLog();render()});
  document.querySelectorAll("[data-guia]").forEach(b=>b.onclick=()=>{const id=b.dataset.guia;ST.abierto=ST.abierto===id?null:id;render()});
  document.querySelectorAll("[data-wpeso]").forEach(inp=>inp.onchange=()=>{const id=inp.dataset.wpeso;const kgVal=pesoToKg(inp.value);log.pesos[id]=kgVal;saveLog();if(log.done[id])registrarPeso(id,kgVal)});
  document.querySelectorAll("[data-com]").forEach(b=>b.onclick=()=>{const id=b.dataset.com;log.comidas[id]=!log.comidas[id];saveLog();render()});
  document.querySelectorAll("[data-agua]").forEach(b=>b.onclick=()=>{const n=+b.dataset.agua;log.agua=(n===log.agua)?n-1:n;saveLog();render()});
  document.querySelectorAll("[data-compra]").forEach(b=>b.onclick=()=>{const id=b.dataset.compra;compras[id]=!compras[id];DB.set("compras",compras);render()});
  document.querySelectorAll("[data-menu]").forEach(inp=>inp.onchange=()=>{MENU[+inp.dataset.menu][inp.dataset.f]=inp.value;guardarEdicion()});
  const rc=document.getElementById("resetCompras");if(rc)rc.onclick=()=>{compras={};DB.set("compras",{});render()};
  const gm=document.getElementById("guardarMedida");if(gm)gm.onclick=()=>{
    const p=parseFloat(document.getElementById("inPeso").value),c=parseFloat(document.getElementById("inCint").value);
    if(!p&&!c)return;
    medidas=medidas.filter(m=>m.fecha!==ST.fecha);medidas.push({fecha:ST.fecha,peso:p?pesoToKg(p):null,cintura:c||null});
    medidas.sort((a,b)=>a.fecha.localeCompare(b.fecha));DB.set("medidas",medidas);render();};
  const bn=document.getElementById("btnNotif");if(bn)bn.onclick=pedirNotif;
  const be=document.getElementById("btnEdit");if(be)be.onclick=()=>{if(ST.edit)guardarEdicion();ST.edit=!ST.edit;render()};
  const br=document.getElementById("btnReset");if(br)br.onclick=resetTodo;
  document.querySelectorAll("[data-unidad]").forEach(b=>b.onclick=()=>{UNIDAD=b.dataset.unidad;DB.set("unidad",UNIDAD);render();});
}

render();
programarRecordatorios();

/* ===== Registro del Service Worker (PWA) ===== */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("service-worker.js")
      .then(()=>{ if(DB.get("notif")) programarRecordatorios(); })
      .catch((err)=>console.warn("SW no registrado:",err));
  });
}
</script>
</body>
</html>
